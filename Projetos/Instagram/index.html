<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram init page</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Container de exibição -->
    <div class="container">
        <div class="imgs-container">
            <div class="icon-container">
                <img src="img/icons8-instagram-96.png" alt="Logo instagram">
            </div>
            <div class="slogan-container">
                <p>See everyday moments from your <span class="emphasis">close friends</span></p>
            </div>
            <div class="photo-container">
                <img src="img/img-example.png" alt="Imagem de exemplo">
            </div>
        </div>
        <!-- Container para preencher dados -->
        <div class="data-container">
            <h2>Log into Instagram</h2>
            <div class="entry-info">
                <p>Mobile number, username or email</p>
            </div>
            <div class="entry-info">
                <p>Password</p>
            </div>
            <div class="btns-container-1">
                <button class="blue-btn">Log in</button>
                <button class="transparent-btn">Forgot password?</button>
            </div>
            <div class="btns-container-2">
                <button class="simple-btn">
                    <img src="img/icons8-facebook-novo-96.png" alt="Facebook logo">
                    <span>Log in with Facebook</span>
                </button>
                <button class="invert-blue-btn">Create new account</button>
            </div>
            <div class="logo-container">
                <img src="img/icons8-meta-96.png" alt="Meta logo">
                <span>Meta</span>
            </div>
        </div>
     </div>
     <!-- Footer -->
    <div class="footer-container">
        <div class="links-container">
            <p>Meta</p>
            <p>About</p>
            <p>Blog</p>
            <p>Jobs</p>
            <p>Help</p>
            <p>API</p>
            <p>Privacy</p>
            <p>Terms</p>
            <p>Locations</p>
            <p>Instagram Lite</p>
            <p>Meta AI</p>
            <p>Threads</p>
            <p>Contact Uploading & Non-Users</p>
            <p>Meta Verified</p>
        </div>
        <div class="infos-footer">
            <p>English</p>
            <p><img src="img/icons8-direitos-autorais-96.png" alt="copyright"> 2026 Instagram from Meta</p>
        </div>
    </div>
</body>
</html>
